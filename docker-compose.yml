# ═══════════════════════════════════════════════════════════════════════════════
# CarniTrack Edge Service - Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   1. Create .env:  bun scripts/create-env.ts   (or ./scripts/docker-setup.sh env)
#   2. Development:  docker compose up
#   3. Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Logs:           docker compose logs -f carnitrack-edge
#   Stop:           docker compose down
#
# The .env file (from create-env.ts) is loaded into the container.
#
# LAN printers (TSC :9100) + Web UI discovery:
#   - Linux on-site: docker compose -f docker-compose.yml -f docker-compose.host-network.yml up -d
#   - Bridge / Docker Desktop: set HOST_IP in .env to your LAN address for correct /24 hints.
# ═══════════════════════════════════════════════════════════════════════════════

services:
  carnitrack-edge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carnitrack-edge
    restart: unless-stopped
    
    # Load .env from project root (created by create-env.ts)
    env_file:
      - .env
    
    # ─────────────────────────────────────────────────────────────────────────────
    # Port Mapping
    # ─────────────────────────────────────────────────────────────────────────────
    ports:
      # Admin Dashboard (HTTP)
      - "${HTTP_PORT:-3000}:3000"
      # Scale TCP Server - DP-401 scales connect here
      - "${TCP_PORT:-8899}:8899"
    
    # ─────────────────────────────────────────────────────────────────────────────
    # Environment Variables
    # ─────────────────────────────────────────────────────────────────────────────
    environment:
      # Edge Identity (set these for your site)
      - EDGE_NAME=${EDGE_NAME:-}
      - SITE_ID=${SITE_ID:-}
      - REGISTRATION_TOKEN=${REGISTRATION_TOKEN:-}
      
      # Cloud Connection (default from create-env.ts)
      - CLOUD_API_URL=${CLOUD_API_URL:-https://carnitrack-app-1000671720976.europe-west1.run.app/api/v1}
      
      # Servers
      - TCP_PORT=${TCP_PORT:-8899}
      - TCP_HOST=${TCP_HOST:-0.0.0.0}
      - HTTP_PORT=${HTTP_PORT:-3000}
      - HTTP_HOST=${HTTP_HOST:-0.0.0.0}
      
      # Database
      - DB_PATH=/app/data/carnitrack.db

      # LAN identity for dashboard + printer discovery default subnet (bridge / Docker Desktop)
      - HOST_IP=${HOST_IP:-}

      # Label printers (TSC raw TCP9100); see .env.example
      - PRINTERS=${PRINTERS:-}
      - PRINTER_DISPATCH_INTERVAL_MS=${PRINTER_DISPATCH_INTERVAL_MS:-}
      - PRINTER_HEALTH_CHECK_INTERVAL_MS=${PRINTER_HEALTH_CHECK_INTERVAL_MS:-}
      - PRINTER_POLL_INTERVAL_MS=${PRINTER_POLL_INTERVAL_MS:-}
      - PRINTER_DISPATCH_TIMEOUT_MS=${PRINTER_DISPATCH_TIMEOUT_MS:-}
      - PRINTER_CONNECT_TIMEOUT_MS=${PRINTER_CONNECT_TIMEOUT_MS:-}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    
    # ─────────────────────────────────────────────────────────────────────────────
    # Volumes - Persist data across container restarts
    # ─────────────────────────────────────────────────────────────────────────────
    volumes:
      # SQLite database - CRITICAL: persist this!
      - carnitrack-data:/app/data
      # Logs
      - carnitrack-logs:/app/logs
      # Generated PLU files
      - carnitrack-generated:/app/generated
    
    # ─────────────────────────────────────────────────────────────────────────────
    # Extra Hosts (for connecting to mock server on host machine)
    # Allows container to access services running on host via host.docker.internal
    # ─────────────────────────────────────────────────────────────────────────────
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # ─────────────────────────────────────────────────────────────────────────────
    # Health Check
    # ─────────────────────────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # ─────────────────────────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ═══════════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  carnitrack-data:
    name: carnitrack-edge-data
  carnitrack-logs:
    name: carnitrack-edge-logs
  carnitrack-generated:
    name: carnitrack-edge-generated
