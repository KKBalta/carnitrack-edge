# Build standalone Edge binaries (Bun --compile) and attach to a rolling GitHub Release.
#
# Stable download URLs (set these in your webapp / Cloud Run env):
#   EDGE_CLIENT_DOWNLOAD_URL_WINDOWS=https://github.com/<OWNER>/<REPO>/releases/download/edge-latest/carnitrack-edge-windows-x64.exe
#   EDGE_CLIENT_DOWNLOAD_URL_LINUX=https://github.com/<OWNER>/<REPO>/releases/download/edge-latest/carnitrack-edge-linux-x64
#
# This workflow updates the same release tag `edge-latest` each run (replace artifacts).
# Alternative: pin to a version tag by using releases/download/v1.2.3/... after you tag releases manually.

name: Release Edge binaries

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-edge-binaries-${{ github.ref }}
  cancel-in-progress: true

env:
  # Use Node 24 for JavaScript-based actions until it is the default (see GitHub deprecation of Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build Windows + Linux
        run: bun run build:all

      - name: Stage release assets (fixed names for stable URLs)
        run: |
          mkdir -p release-assets
          cp dist/windows/carnitrack-edge.exe release-assets/carnitrack-edge-windows-x64.exe
          cp dist/linux/carnitrack-edge release-assets/carnitrack-edge-linux-x64
          chmod +x release-assets/carnitrack-edge-linux-x64
          ls -la release-assets/

      # GitHub CLI: delete + recreate so tag `edge-latest` always points at this commit and assets refresh.
      # (Third-party release actions sometimes attach assets without obvious logs; `gh` output is explicit.)
      - name: Publish rolling release (edge-latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          gh release delete edge-latest --yes --cleanup-tag 2>/dev/null || true
          NOTES="Automated build from ${{ github.sha }} on ${{ github.ref_name }}. Assets: carnitrack-edge-windows-x64.exe, carnitrack-edge-linux-x64. Set EDGE_CLIENT_DOWNLOAD_URL_* to this release URLs."
          gh release create edge-latest \
            release-assets/carnitrack-edge-windows-x64.exe \
            release-assets/carnitrack-edge-linux-x64 \
            --title "CarniTrack Edge — latest (main)" \
            --notes "${NOTES}" \
            --target "${{ github.sha }}" \
            --latest
          echo "OK: release edge-latest published."
          gh release view edge-latest --json url,tagName,assets --jq .
